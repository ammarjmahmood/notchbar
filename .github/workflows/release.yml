name: Release DMG

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create or update (example: v1.1.1)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Build DMG
        shell: bash
        run: |
          chmod +x scripts/build-dmg.sh
          ./scripts/build-dmg.sh

      - name: Generate checksum file
        shell: bash
        run: |
          shasum -a 256 dist/NotchBar.dmg > dist/NotchBar.dmg.sha256.txt

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.meta.outputs.tag }}
          VERSION: ${{ steps.meta.outputs.version }}
        shell: bash
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" \
              dist/NotchBar.dmg#NotchBar.dmg \
              dist/NotchBar.dmg.sha256.txt#NotchBar.dmg.sha256.txt \
              --clobber
          else
            gh release create "$TAG" \
              dist/NotchBar.dmg#NotchBar.dmg \
              dist/NotchBar.dmg.sha256.txt#NotchBar.dmg.sha256.txt \
              --target "$GITHUB_SHA" \
              --title "NotchBar $VERSION" \
              --generate-notes
          fi
